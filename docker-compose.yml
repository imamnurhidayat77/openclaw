services:
  # ── OpenClaw AI App ──────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: openclaw-ai
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      # Mount .env for easy config changes (optional, env_file sudah cukup)
      - ./.env:/app/.env:ro
    networks:
      - openclaw-net

networks:
  openclaw-net:
    driver: bridge
